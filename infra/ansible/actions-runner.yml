- name: Install GitHub Actions Runner on Amazon Linux 2023
  hosts: all
  become: yes
  vars:
    runner_version: "2.330.0"
    runner_user: "actions"
    runner_dir: "/opt/actions-runner"
    github_repo: "https://github.com/BenHeil26/website"  # Replace with your GitHub org/repo
    runner_token: "A4ZGNZ44GASDAT3QZZETKV3JL463U"  # Replace with your GitHub runner registration token

  tasks:
    - name: Ensure required packages are installed
      ansible.builtin.yum:
        name:
          - tar
          - jq
          - git
          - dotnet-sdk-6.0 
        state: present

    - name: Create runner user
      ansible.builtin.user:
        name: "{{ runner_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Create runner directory
      ansible.builtin.file:
        path: "{{ runner_dir }}"
        state: directory
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"

    - name: Download GitHub Actions runner
      ansible.builtin.get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
        dest: "{{ runner_dir }}/actions-runner.tar.gz"
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"

    - name: Extract runner
      ansible.builtin.unarchive:
        src: "{{ runner_dir }}/actions-runner.tar.gz"
        dest: "{{ runner_dir }}"
        remote_src: yes
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"

    - name: Configure runner
      ansible.builtin.command: >
        ./config.sh --unattended --url https://github.com/{{ github_repo }} --token {{ runner_token }} --name ben-heil.com --labels amazon-linux
      args:
        chdir: "{{ runner_dir }}"
      become_user: "{{ runner_user }}"

    - name: Install runner service
      ansible.builtin.command: ./svc.sh install
      args:
        chdir: "{{ runner_dir }}"
      become_user: "{{ runner_user }}"

    - name: Start runner service
      ansible.builtin.command: ./svc.sh start
      args:
        chdir: "{{ runner_dir }}"
      become_user: "{{ runner_user }}"
