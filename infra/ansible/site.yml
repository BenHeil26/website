- name: Apache + Let's Encrypt (Amazon Linux 2023)
  hosts: web
  become: yes

  vars:
    domain: "ben-heil.com"
    email: "ben.heil.dev@gmail.com"
    webroot: "/var/www/letsencrypt"

  tasks:
    - name: Install base packages
      ansible.builtin.dnf:
        name:
          - httpd
          - mod_ssl
          - certbot
          - mod_proxy
          - mod_proxy_http
        state: present

    - name: Create ACME webroot
      ansible.builtin.file:
        path: "{{ webroot }}"
        state: directory
        owner: apache
        group: apache
        mode: "0755"

    - name: Enable and start Apache
      ansible.builtin.systemd:
        name: httpd
        enabled: true
        state: started

    # HTTP vhost for ACME challenge
    - name: Install HTTP vhost (ACME challenge)
      ansible.builtin.copy:
        dest: /etc/httpd/conf.d/ben-heil.com-80.conf
        mode: "0644"
        content: |
          <VirtualHost *:80>
              ServerName ben-heil.com
              ServerAlias www.ben-heil.com
              DocumentRoot {{ webroot }}

              Alias /.well-known/acme-challenge/ {{ webroot }}/.well-known/acme-challenge/
              <Directory "{{ webroot }}/.well-known/acme-challenge/">
                  Require all granted
              </Directory>
          </VirtualHost>

    - name: Reload Apache
      ansible.builtin.systemd:
        name: httpd
        state: reloaded

    - name: Obtain Let's Encrypt certificate
      ansible.builtin.command: >
        certbot certonly --webroot
        -w {{ webroot }}
        -d ben-heil.com
        -d www.ben-heil.com
        --email {{ email }}
        --agree-tos
        --non-interactive
      args:
        creates: /etc/letsencrypt/live/ben-heil.com/fullchain.pem

    - name: Remove ACME webroot vhost
      ansible.builtin.file:
        path: /etc/httpd/conf.d/ben-heil.com-80.conf
        state: absent

    - name: Install HTTPS vhost
      ansible.builtin.copy:
        dest: /etc/httpd/conf.d/ben-heil.com.conf
        mode: "0644"
        content: |
          <VirtualHost *:443>
              ServerName ben-heil.com
              ServerAlias www.ben-heil.com

              SSLEngine on
              SSLCertificateFile /etc/letsencrypt/live/ben-heil.com/fullchain.pem
              SSLCertificateKeyFile /etc/letsencrypt/live/ben-heil.com/privkey.pem

              ProxyPreserveHost On
              ProxyPass / http://localhost:8080/
              ProxyPassReverse / http://localhost:8080/

              ErrorLog /var/log/httpd/ben-heil.com-error.log
              CustomLog /var/log/httpd/ben-heil.com-access.log combined
          </VirtualHost>

    - name: Install HTTP -> HTTPS redirect
      ansible.builtin.copy:
        dest: /etc/httpd/conf.d/ben-heil.com-redirect.conf
        mode: "0644"
        content: |
          <VirtualHost *:80>
              ServerName ben-heil.com
              ServerAlias www.ben-heil.com
              Redirect permanent / https://ben-heil.com/
          </VirtualHost>

    - name: Reload Apache
      ansible.builtin.systemd:
        name: httpd
        state: reloaded
    
    - name: Apache config test
      ansible.builtin.command: apachectl configtest


